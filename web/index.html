<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/bfrost-logo.jpeg" />
    <title>BFrost Control Room</title>
    <meta
      name="description"
      content="React dashboard for BFrost model settings, cron jobs, queue health, and LM Studio status."
    />
    <style>
      .bfrost-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: #ffffff;
        z-index: 1000;
      }
      .bfrost-splash img {
        width: 128px;
        height: 128px;
        border-radius: 24px;
        object-fit: cover;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      }
      .bfrost-splash span {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.875rem;
        color: #64748b;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="bfrost-splash">
        <img src="/bfrost-logo.jpeg" alt="BFrost" />
        <span>Loading BFrost…</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
